<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    {% seo %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ '/' | relative_url }}" class="nav-logo">DevOps Hub</a>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu">
                {% for item in site.navigation %}
                <li><a href="{{ item.url | relative_url }}" class="nav-link">{{ item.title }}</a></li>
                {% endfor %}
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            {{ content }}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; {{ site.time | date: "%Y" }} {{ site.author }}. DevOps Learning Hub.</p>
            <p>Last updated: {{ site.time | date: "%B %d, %Y" }}</p>
        </div>
    </footer>

    <script>
        // Mobile nav toggle
        document.querySelector('.nav-toggle').addEventListener('click', function() {
            document.querySelector('.nav-menu').classList.toggle('active');
        });
    </script>
</body>
</html>
